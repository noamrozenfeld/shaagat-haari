name: Update Dashboard Data

on:
  schedule:
    - cron: '*/5 * * * *'    # scraper — every 5 min
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run AI scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ai_scrape.py

  
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "auto: עדכון AI $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main --autostash && git push origin main && break
            echo "Retry $i..." && sleep 5
          done

      - name: Done
        run: echo "✅ ריצה הסתיימה"
